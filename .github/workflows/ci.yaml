name: CI
on:
  pull_request:
    branches: ['main']
  workflow_dispatch:
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - name: Generate Environment
        run: ./scripts/generate-env.sh
      - name: Configure Git
        run: |
          # necessary for the git commands used for release info
          git config --global --add safe.directory /__w/OpenDataCapture/OpenDataCapture
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      # Run lint and unit tests before the (occasionally flaky) Playwright install so those results
      # aren't blocked by a hung browser download.
      - name: Lint
        run: pnpm lint
      - name: Unit Tests
        run: pnpm test
      # Install OS deps and browser binaries separately. The apt step is reliable; the browser
      # download is what hangs (a stalled CDN socket with no internal timeout), so it's wrapped in a
      # per-attempt `timeout` + retry. Playwright skips already-downloaded browsers, so each retry
      # resumes where the last left off. Only chromium + firefox are used by the e2e suite.
      - name: Install Playwright system dependencies
        timeout-minutes: 5
        env:
          DEBIAN_FRONTEND: noninteractive
        run: pnpm --filter "@opendatacapture/e2e" exec playwright install-deps chromium firefox
      - name: Install Playwright browsers
        timeout-minutes: 10
        run: |
          for attempt in 1 2 3; do
            echo "Downloading Playwright browsers (attempt ${attempt})..."
            if timeout 180 pnpm --filter "@opendatacapture/e2e" exec playwright install chromium firefox; then
              exit 0
            fi
            echo "Attempt ${attempt} stalled or failed; retrying..."
          done
          echo "Playwright browser download failed after 3 attempts."
          exit 1
      - name: End-to-End Tests
        run: pnpm --filter "@opendatacapture/e2e" test
