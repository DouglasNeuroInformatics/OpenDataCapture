name: CI
on:
  pull_request:
    branches: ['main']
  workflow_dispatch:
jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Setup PNPM
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version-file: '.nvmrc'
      - name: Generate Environment
        run: ./scripts/generate-env.sh
      - name: Configure Git
        run: |
          # necessary for the git commands used for release info
          git config --global --add safe.directory /__w/OpenDataCapture/OpenDataCapture
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      # Run lint and unit tests before the (occasionally flaky) Playwright install so those results
      # aren't blocked by a hung browser download.
      - name: Lint
        run: pnpm lint
      - name: Unit Tests
        run: pnpm test
      - name: Install Playwright
        # Cap the step so a hang fails fast instead of hitting the 6h job limit, skip the interactive
        # apt prompt, and install only the browsers the e2e suite uses.
        timeout-minutes: 10
        env:
          DEBIAN_FRONTEND: noninteractive
        run: pnpm --filter "@opendatacapture/testing" exec playwright install --with-deps chromium firefox
      - name: End-to-End Tests
        run: pnpm test:e2e
